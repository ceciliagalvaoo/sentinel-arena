services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: sentinel
    ports:
      - "5432:5432"
    volumes:
      - sentinel_pgdata:/var/lib/postgresql/data
      # Official postgres image auto-runs any .sql here, in filename order,
      # but ONLY on first init of an empty data dir — so this only fires
      # once, on a genuinely fresh `sentinel_pgdata` volume.
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  agent-aggressive:
    build:
      context: .
      dockerfile: apps/agent-aggressive/Dockerfile
    env_file: ./apps/agent-aggressive/.env
    environment:
      # env_file above is the same one used for local (non-docker) dev, where
      # "localhost" correctly reaches the port-mapped Postgres — inside this
      # container it would resolve to the container itself, not the postgres
      # service. `environment:` wins over `env_file:` for the same key, so
      # this is the only override actually needed for in-network DNS.
      DATABASE_URL: postgres://postgres:devpassword@postgres:5432/sentinel
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./secrets:/app/secrets:ro

  agent-conservative:
    build:
      context: .
      dockerfile: apps/agent-conservative/Dockerfile
    env_file: ./apps/agent-conservative/.env
    environment:
      DATABASE_URL: postgres://postgres:devpassword@postgres:5432/sentinel
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./secrets:/app/secrets:ro

  backend-api:
    build:
      context: .
      dockerfile: apps/backend-api/Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:devpassword@postgres:5432/sentinel
      SOLANA_RPC_URL: https://api.devnet.solana.com
      PORT: "4000"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    environment:
      # NEXT_PUBLIC_* vars are baked in at build time and run in the judge's
      # browser on the HOST, not inside the container network — localhost is
      # correct here (backend-api's port is published to the host below).
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_SOLANA_CLUSTER: devnet
    ports:
      - "3000:3000"
    depends_on:
      - backend-api

volumes:
  sentinel_pgdata:
