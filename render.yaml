# Render Blueprint for Sentinel Arena.
#
# Deploys backend-api + the dashboard as two services from this repo, each
# building its own Dockerfile (apps/*/Dockerfile) with the repo root as
# build context -- same pattern already used by docker-compose.yml locally.
#
# The two agents (agent-aggressive, agent-conservative) are deliberately
# NOT here: Render has no free tier for Background Workers (only paid
# Starter+), and they need to run 24/7 without sleeping (Autonomous
# Operation is a hard judging criterion). They run instead on a free-tier
# Google Cloud e2-micro VM via docker-compose.agents.yml -- see
# DEPLOYMENT.md.
#
# Database is also NOT defined here: Postgres lives on Supabase, not on
# Render (Render's free Postgres tier expires around 30 days, too short for
# the hackathon judging window). Both services below take DATABASE_URL as a
# manually-entered secret (sync: false) instead.
#
# Field names/values here are a best-effort blueprint prepared ahead of
# time; validate them against Render's current dashboard when actually
# syncing.
#
# --- Before syncing this blueprint ---
# 1. Run db/migrations against the Supabase database (scripts/migrate.ts,
#    DATABASE_URL pointed at Supabase) -- Render does not run migrations
#    automatically. (Already done as of 2026-07-12.)
# 2. Know backend-api's public Render URL before setting dashboard's
#    NEXT_PUBLIC_API_URL -- it's baked into the dashboard's static JS bundle
#    at Docker build time (see apps/dashboard/Dockerfile), so backend-api
#    must be deployed first, and the dashboard rebuilt if that URL changes.
# 3. Render's free web services spin down after 15 min of no traffic and
#    cold-start on the next request -- fine for a judge occasionally
#    opening the dashboard, just expect the first load after idle time to
#    take a few extra seconds.

services:
  - type: web
    name: sentinel-backend-api
    runtime: docker
    dockerfilePath: ./apps/backend-api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "4000"
      - key: NETWORK
        value: devnet
      - key: SOLANA_RPC_URL
        value: https://api.devnet.solana.com
      - key: DATABASE_URL
        sync: false # Supabase connection string (Session pooler), must include ?sslmode=require or similar

  - type: web
    name: sentinel-dashboard
    runtime: docker
    dockerfilePath: ./apps/dashboard/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      # NEXT_PUBLIC_* are baked in at `docker build` time (see
      # apps/dashboard/Dockerfile ARG/ENV pair) -- Render is known to pass
      # envVars through as build args automatically when the Dockerfile
      # declares a matching ARG, which this one already does.
      - key: NEXT_PUBLIC_API_URL
        sync: false # set to sentinel-backend-api's public Render URL, e.g. https://sentinel-backend-api.onrender.com
      - key: NEXT_PUBLIC_SOLANA_CLUSTER
        value: devnet
